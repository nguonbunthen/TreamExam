<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ចូលប្រើប្រាស់ | TreamExam</title>
    <meta name="theme-color" content="#9a623a" />
    <link rel="icon" type="image/png" href="assets/images/logo1.png" />
    <link rel="apple-touch-icon" href="assets/images/logo1.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .auth-container {
        width: 100%;
        max-width: 420px;
        padding: 1rem 1.5rem;
        text-align: center;
      }
      .auth-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 1rem;
      }
      .auth-header img {
        width: 90px;
        margin-bottom: 1rem;
      }
      .auth-header h1 {
        margin: 0 0 0.5rem 0;
        font-size: 1.6rem;
      }
      .auth-header p {
        margin: 0;
        color: var(--muted);
      }
      .auth-form {
        margin-top: 2rem;
        text-align: left;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
      }
      .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-family: inherit;
        font-size: 1rem;
        background: var(--surface);
        color: var(--ink);
      }
      .divider {
        margin: 2rem 0;
        position: relative;
        border-top: 1px solid #eee;
      }
      .divider span {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--paper);
        padding: 0 10px;
        color: #888;
        font-size: 0.9rem;
      }
      .full-width {
        width: 100%;
        justify-content: center;
      }
      .google-btn {
        background: var(--surface) !important;
        color: var(--ink) !important;
        border: 1px solid var(--line) !important;
        margin-bottom: 0.75rem;
      }
      .google-btn i {
        color: #4285f4; /* Google Blue */
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="auth-container">
        <div class="auth-header">
          <img src="assets/images/logo1.png" alt="TreamExam" />
          <h1 id="authTitle">ចូលប្រើប្រាស់</h1>
          <p id="authDesc">សូមបំពេញព័ត៌មានខាងក្រោមដើម្បីចូលគណនី</p>
        </div>

        <!-- ផ្ទាំងចូលគណនី (Login Form) -->
        <form class="auth-form" id="loginForm" action="index.html">
          <div class="form-group">
            <label for="username">ឈ្មោះអ្នកប្រើប្រាស់ ឬ អ៊ីមែល</label>
            <input
              type="text"
              id="loginUsername"
              placeholder="បញ្ចូលឈ្មោះរបស់អ្នក"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">លេខសម្ងាត់</label>
            <input
              type="password"
              id="loginPassword"
              placeholder="បញ្ចូលលេខសម្ងាត់"
              required
            />
          </div>
          <button type="submit" class="primary-action full-width">
            <span>ចូលប្រើប្រាស់</span>
            <i class="fa-solid fa-right-to-bracket"></i>
          </button>

          <p
            style="
              margin-top: 1.5rem;
              font-size: 0.95rem;
              text-align: center;
              color: var(--muted);
            "
          >
            មិនទាន់មានគណនី?
            <a
              href="#"
              id="showRegisterBtn"
              style="
                color: var(--primary, #9a623a);
                font-weight: 600;
                text-decoration: none;
              "
              >បង្កើតគណនីថ្មី</a
            >
          </p>
        </form>

        <!-- ផ្ទាំងបង្កើតគណនី (Register Form) -->
        <form
          class="auth-form"
          id="registerForm"
          action="index.html"
          style="display: none"
        >
          <div class="form-group">
            <label for="regName">ឈ្មោះពេញ</label>
            <input
              type="text"
              id="regName"
              placeholder="បញ្ចូលឈ្មោះពេញរបស់អ្នក"
              required
            />
          </div>
          <div class="form-group">
            <label for="regEmail">អ៊ីមែល</label>
            <input
              type="email"
              id="regEmail"
              placeholder="បញ្ចូលអ៊ីមែល"
              required
            />
          </div>
          <div class="form-group">
            <label for="regPassword">លេខសម្ងាត់</label>
            <input
              type="password"
              id="regPassword"
              placeholder="បង្កើតលេខសម្ងាត់"
              required
            />
          </div>
          <button type="submit" class="primary-action full-width">
            <span>បង្កើតគណនី</span>
            <i class="fa-solid fa-user-plus"></i>
          </button>

          <p
            style="
              margin-top: 1.5rem;
              font-size: 0.95rem;
              text-align: center;
              color: var(--muted);
            "
          >
            មានគណនីរួចហើយ?
            <a
              href="#"
              id="showLoginBtn"
              style="
                color: var(--primary, #9a623a);
                font-weight: 600;
                text-decoration: none;
              "
              >ចូលប្រើប្រាស់វិញ</a
            >
          </p>
        </form>

        <div class="divider"><span>ឬ</span></div>

        <button
          type="button"
          class="secondary-action full-width google-btn"
          id="googleLoginBtn"
        >
          <i class="fa-brands fa-google"></i>
          <span>ចូលប្រើប្រាស់ជាមួយ Google</span>
        </button>

        <a href="index.html" class="secondary-action link-action full-width">
          <i class="fa-solid fa-bolt"></i>
          <span>សាកល្បងដោយមិនចាំបាច់ចូលគណនី</span>
        </a>
      </section>
    </main>

    <script>
      const currentTheme = localStorage.getItem("treamExamTheme");
      if (currentTheme === "dark") {
        document.body.classList.add("dark-theme");
      }

      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const showRegisterBtn = document.getElementById("showRegisterBtn");
      const showLoginBtn = document.getElementById("showLoginBtn");
      const authTitle = document.getElementById("authTitle");
      const authDesc = document.getElementById("authDesc");

      showRegisterBtn.addEventListener("click", (e) => {
        e.preventDefault();
        loginForm.style.display = "none";
        registerForm.style.display = "block";
        authTitle.textContent = "បង្កើតគណនីថ្មី";
        authDesc.textContent = "សូមបំពេញព័ត៌មានខាងក្រោមដើម្បីបង្កើតគណនី";
      });

      showLoginBtn.addEventListener("click", (e) => {
        e.preventDefault();
        registerForm.style.display = "none";
        loginForm.style.display = "block";
        authTitle.textContent = "ចូលប្រើប្រាស់";
        authDesc.textContent = "សូមបំពេញព័ត៌មានខាងក្រោមដើម្បីចូលគណនី";
      });
    </script>
  </body>
</html>
