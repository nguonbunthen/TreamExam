<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ជ្រើសរើសប្រភេទវិញ្ញាសា | TreamExam</title>
    <meta name="theme-color" content="#9a623a" />
    <link rel="icon" type="image/png" href="assets/images/logo1.png" />
    <link rel="apple-touch-icon" href="assets/images/logo1.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <main class="app-shell">
      <header
        class="topbar"
        style="
          position: sticky;
          top: 0;
          z-index: 1000;
          background: var(--paper);
          border-bottom: 1px solid var(--line);
        "
      >
        <a class="icon-btn" href="index.html" aria-label="ទំព័រដើម">
          <i class="fa-solid fa-house"></i>
        </a>
        <div style="display: flex; gap: 8px; align-items: center">
          <button
            class="icon-btn"
            id="themeToggleBtn"
            type="button"
            aria-label="ប្តូរពណ៌ងងឹត"
          >
            <i class="fa-solid fa-moon"></i>
          </button>
          <button
            class="icon-btn"
            id="menuBtn"
            type="button"
            aria-label="បើកម៉ឺនុយ"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </header>

      <nav class="mobile-menu" id="mobileMenu" aria-label="Primary">
        <a href="index.html">ទំព័រដើម</a>
        <a href="index.html#categories">វិញ្ញាសាប្រភេទក្រសួង</a>
        <a href="result.html">លទ្ធផល</a>
        <a href="login.html">ចូលប្រើប្រាស់</a>
      </nav>

      <section
        class="category-detail compact-detail"
        id="categoryDetail"
      ></section>

      <section class="section-head">
        <div>
          <p>ជំហានបន្ទាប់</p>
          <h2>ជ្រើសរើសប្រភេទវិញ្ញាសា</h2>
        </div>
      </section>

      <section
        class="exam-type-list"
        id="examTypeList"
        aria-label="ប្រភេទវិញ្ញាសា"
      ></section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
