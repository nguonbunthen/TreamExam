<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>លទ្ធផល | TreamExam</title>
    <meta name="theme-color" content="#9a623a" />
    <link rel="icon" type="image/png" href="assets/images/logo1.png" />
    <link rel="apple-touch-icon" href="assets/images/logo1.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <main class="app-shell">
      <header
        class="topbar"
        style="
          position: sticky;
          top: 0;
          z-index: 1000;
          background: var(--paper);
          border-bottom: 1px solid var(--line);
        "
      >
        <a class="icon-btn" href="index.html" aria-label="ទំព័រដើម">
          <i class="fa-solid fa-house"></i>
        </a>
        <div style="display: flex; gap: 8px; align-items: center">
          <button
            class="icon-btn"
            id="themeToggleBtn"
            type="button"
            aria-label="ប្តូរពណ៌ងងឹត"
          >
            <i class="fa-solid fa-moon"></i>
          </button>
          <button
            class="icon-btn"
            id="menuBtn"
            type="button"
            aria-label="បើកម៉ឺនុយ"
          >
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
      </header>

      <nav class="mobile-menu" id="mobileMenu" aria-label="Primary">
        <a href="index.html">ទំព័រដើម</a>
        <a href="index.html#categories">វិញ្ញាសាប្រភេទក្រសួង</a>
        <a href="result.html">លទ្ធផល</a>
        <a href="login.html">ចូលប្រើប្រាស់</a>
      </nav>

      <section class="result-card">
        <div class="score-ring" id="scoreRing">
          <strong id="scorePercent">0%</strong>
          <span>ពិន្ទុ</span>
        </div>
        <h1 id="resultTitle">លទ្ធផលតេស្ត</h1>
        <p id="resultMessage">ធ្វើតេស្តមួយ ដើម្បីមើលលទ្ធផលរបស់អ្នក។</p>
      </section>

      <section class="result-stats">
        <div>
          <span>ត្រឹមត្រូវ</span>
          <strong id="correctCount">0</strong>
        </div>
        <div>
          <span>សំណួរសរុប</span>
          <strong id="totalCount">0</strong>
        </div>
        <div>
          <span>ប្រភេទ</span>
          <strong id="resultCategory">-</strong>
        </div>
      </section>

      <div class="result-actions">
        <a
          class="primary-action"
          id="nextSetBtn"
          href="#"
          style="display: none"
        >
          <span>បន្តទៅវិញ្ញាសាបន្ទាប់</span>
          <i class="fa-solid fa-arrow-right"></i>
        </a>
        <a class="primary-action" id="retryBtn" href="index.html">
          <span>ធ្វើតេស្តម្តងទៀត</span>
          <i class="fa-solid fa-rotate-right"></i>
        </a>
        <a
          class="secondary-action link-action"
          id="chooseOtherBtn"
          href="index.html"
        >
          <i class="fa-solid fa-layer-group"></i>
          <span>ជ្រើសរើសវិញ្ញាសាផ្សេង</span>
        </a>
      </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
