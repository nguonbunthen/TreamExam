<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>កំពុងអភិវឌ្ឍ | TreamExam</title>
    <meta name="theme-color" content="#9a623a" />
    <link rel="icon" type="image/png" href="assets/images/logo1.png" />
    <link rel="apple-touch-icon" href="assets/images/logo1.png" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 24px;
      }
      .dev-icon {
        background: #fff3e0;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 10px 25px rgba(243, 156, 18, 0.15);
      }
      .dev-icon i {
        font-size: 48px;
        color: #f39c12;
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 1.8rem;
        color: #1a1a1a;
      }
      p {
        color: #666;
        font-size: 1.1rem;
        margin: 0 0 32px 0;
        white-space: nowrap;
      }
      @media (max-width: 480px) {
        p {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <div class="dev-icon">
        <i class="fa-solid fa-person-digging"></i>
      </div>
      <h1>កំពុងអភិវឌ្ឍ...</h1>
      <p>វិញ្ញាសាសម្រាប់ផ្នែកនេះ មិនទាន់ដាក់ឱ្យប្រើប្រាស់នៅឡើយទេ។</p>
      <a
        href="javascript:history.back()"
        class="primary-action"
        style="
          text-decoration: none;
          display: inline-flex;
          align-items: center;
          gap: 8px;
          padding: 12px 28px;
          border-radius: 50px;
        "
      >
        <i class="fa-solid fa-arrow-left"></i>
        <span>ត្រឡប់ក្រោយ</span>
      </a>
    </main>
  </body>
</html>
